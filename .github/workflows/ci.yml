name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  nextjs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
